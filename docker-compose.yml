version: "3.9"

services:
  python:
    image: python:3.10
    container_name: python_data
    volumes:
      - .:/app
    working_dir: /app
    command: tail -f /dev/null
    ports:
      - "8889:8888"

  postgres:
    image: postgres:15
    container_name: postgres_data
    environment:
      POSTGRES_USER: datauser
      POSTGRES_PASSWORD: datapass
      POSTGRES_DB: immobilier_dakar
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
